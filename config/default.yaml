llm:
  provider: claude
  model_screen: claude-haiku-4-5-20251001
  model_analyze: claude-sonnet-4-5-20250929
  model_proof: claude-opus-4-6
  use_batch_api: true
  max_concurrent_requests: 5

discovery:
  unpaywall_email: ${UNPAYWALL_EMAIL:-}
  scimago_csv_path: data/scimago.csv

priority:
  min_citations: 50
  journal_quartile_filter: Q1
  min_priority_score: 40

analysis:
  ela_quality: 95
  clone_min_matches: 10
  noise_block_size: 64
  llm_screening_confidence_threshold: 0.5
  convergence_required: true

  # Method weights for composite scoring (research-based)
  weight_clone_detection: 0.85
  weight_phash: 0.90
  weight_pvalue_check: 0.80
  weight_grim: 0.60
  weight_noise: 0.50
  weight_ela: 0.35
  weight_benford: 0.30
  weight_duplicate_check: 0.25
  weight_llm_vision: 0.70

  # Convergence thresholds
  convergence_confidence_threshold: 0.6
  convergence_confidence_boost: 0.1
  single_method_max_severity: medium

  # ELA severity thresholds
  ela_high_threshold: 60.0
  ela_medium_threshold: 40.0
  ela_low_threshold: 25.0

  # Clone severity thresholds
  clone_high_inliers: 60
  clone_high_ratio: 0.35
  clone_medium_inliers: 40
  clone_medium_ratio: 0.25
  clone_low_inliers: 20
  clone_low_ratio: 0.15

  # Noise severity thresholds
  noise_high_ratio: 20.0
  noise_medium_ratio: 10.0
  noise_low_ratio: 5.0

  # Noise analysis
  noise_intensity_bin_width: 32

  # Figure extraction
  min_figure_width: 50
  min_figure_height: 50

storage:
  database_url: sqlite:///snoopy.db
  pdf_dir: data/pdfs
  figures_dir: data/figures
  reports_dir: data/reports
