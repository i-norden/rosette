llm:
  provider: claude
  model_screen: claude-haiku-4-5-20251001
  model_analyze: claude-sonnet-4-5-20250929
  model_proof: claude-opus-4-6
  use_batch_api: true
  max_concurrent_requests: 5

discovery:
  unpaywall_email: ${UNPAYWALL_EMAIL:-}
  scimago_csv_path: data/scimago.csv

priority:
  min_citations: 50
  journal_quartile_filter: Q1
  min_priority_score: 40

analysis:
  # Nested sub-configs for analysis parameters
  ela:
    quality: 80  # Quality 80 per forensics literature (75-85 range)
    high_threshold: 60.0
    medium_threshold: 40.0
    low_threshold: 25.0
    min_max_diff: 15.0

  clone:
    min_matches: 10
    high_inliers: 60
    high_ratio: 0.35
    medium_inliers: 40
    medium_ratio: 0.25
    low_inliers: 20
    low_ratio: 0.15
    min_inlier_ratio: 0.15

  noise:
    block_size: 64
    intensity_bin_width: 32
    max_ratio_threshold: 25.0
    high_ratio: 50.0
    medium_ratio: 25.0
    low_ratio: 10.0

  llm_screening_confidence_threshold: 0.5
  convergence_required: true

  # Method weights for composite scoring (calibrated against demo benchmark)
  # High weights = highly specific methods (clone detection, phash, p-value)
  # Lower weights = methods prone to PDF compression false positives
  weight_clone_detection: 0.85
  weight_phash: 0.90
  weight_pvalue_check: 0.80
  weight_grim: 0.60
  weight_ela: 0.70
  weight_noise: 0.50
  weight_dct_analysis: 0.30
  weight_jpeg_ghost: 0.30
  weight_fft_analysis: 0.15
  weight_benford: 0.30
  weight_duplicate_check: 0.25
  weight_llm_vision: 0.70
  weight_metadata_forensics: 0.30

  # Phase 2 method weights
  weight_grimmer: 0.60
  weight_terminal_digit: 0.45
  weight_distribution_fit: 0.40
  weight_variance_ratio: 0.70
  weight_tortured_phrases: 0.80
  weight_temporal_patterns: 0.50
  weight_sprite: 0.65

  # Convergence thresholds
  convergence_confidence_threshold: 0.60
  convergence_confidence_boost: 0.1
  single_method_max_severity: medium
  single_method_max_confidence: 0.7

  # Figure extraction
  min_figure_width: 50
  min_figure_height: 50

campaign:
  auto_risk_promotion_threshold: 30.0
  max_authors_per_paper: 20
  max_papers_per_author: 50
  hash_match_max_distance: 10
  network_min_cluster_size: 3
  batch_concurrency: 5
  hash_prefix_length: 2

storage:
  database_url: sqlite:///rosette.db
  pdf_dir: data/pdfs
  figures_dir: data/figures
  reports_dir: data/reports
