services:
  snoopy:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      SNOOPY__STORAGE__DATABASE_URL: "postgresql+asyncpg://snoopy:${POSTGRES_PASSWORD:-snoopy}@postgres:5432/snoopy"
      SNOOPY__STORAGE__PDF_DIR: "/data/pdfs"
      SNOOPY__STORAGE__FIGURES_DIR: "/data/figures"
      SNOOPY__STORAGE__REPORTS_DIR: "/data/reports"
      SNOOPY__LLM__PROVIDER: "${SNOOPY__LLM__PROVIDER:-claude}"
    volumes:
      - pdf-data:/data/pdfs
      - figure-data:/data/figures
      - report-data:/data/reports
    networks:
      - snoopy-net
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: snoopy
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-snoopy}"
      POSTGRES_DB: snoopy
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - snoopy-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snoopy"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pdf-data:
  figure-data:
  report-data:
  pg-data:

networks:
  snoopy-net:
    driver: bridge
