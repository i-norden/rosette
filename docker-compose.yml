services:
  snoopy:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      SNOOPY__STORAGE__DATABASE_URL: "postgresql://snoopy:${POSTGRES_PASSWORD}@postgres:5432/snoopy"
      SNOOPY__STORAGE__PDF_DIR: "/data/pdfs"
      SNOOPY__STORAGE__FIGURES_DIR: "/data/figures"
      SNOOPY__STORAGE__REPORTS_DIR: "/data/reports"
      SNOOPY__LLM__PROVIDER: "${SNOOPY__LLM__PROVIDER:-claude}"
    volumes:
      - pdf-data:/data/pdfs
      - figure-data:/data/figures
      - report-data:/data/reports
    networks:
      - snoopy-net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: snoopy
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: snoopy
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - snoopy-net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - FOWNER
      - DAC_READ_SEARCH
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snoopy"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pdf-data:
  figure-data:
  report-data:
  pg-data:

networks:
  snoopy-net:
    driver: bridge
