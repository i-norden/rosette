# Alembic configuration for rosette.
#
# This file is read by Alembic at runtime.  The sqlalchemy.url value here is a
# fallback; the env.py script overrides it with the URL from RosetteConfig so
# that a single source of truth is maintained.

[alembic]
script_location = rosette/db/alembic
prepend_sys_path = .
sqlalchemy.url = sqlite:///rosette.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
